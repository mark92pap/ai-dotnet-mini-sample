version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-mini-sample-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/app.db;Foreign Keys=True
      - Jwt__Key=ThisIsASecretKeyForJWTTokenGenerationPleaseChangeInProduction
      - Jwt__Issuer=AiMiniSample
      - Jwt__Audience=AiMiniSample
      - Jwt__ExpiryInMinutes=60
    volumes:
      - sqlite-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/User || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  sqlite-data:
    driver: local
